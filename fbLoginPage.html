<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Facebook Log In Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="fbLoginPage.css">
</head>
<body>

<div class="container main-container d-flex align-items-center">
  <div class="row w-100 align-items-center">

    <!-- LEFT SIDE -->
    <div class="col-lg-6 left-content">
      <h1>
        Explore <br>
        the things <br>
        <span>you love.</span>
      </h1>
    </div>

    <!-- RIGHT SIDE -->
    <div class="col-lg-5 offset-lg-1">
      <div class="card login-card p-4">
        <h5 class="mb-4 fw-bold">Log into Facebook</h5>

        <form>
          <div class="mb-3">
            <input type="text" class="form-control" placeholder="Email or mobile number">
          </div>

          <div class="mb-3">
            <input type="password" class="form-control" placeholder="Password">
          </div>

          <div class="d-grid mb-3">
            <button class="btn login-btn">Log in</button>
          </div>

          <div class="text-center mb-3">
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>

          <div class="d-grid">
            <button class="btn create-btn">Create new account</button>
          </div>
        </form>
      </div>

      <div class="text-center mt-4 meta">
        Meta © 2026
      </div>
    </div>

  </div>
</div>

<!-- FOOTER -->
<div class="container mt-5">
  <hr>
  <div class="footer-links text-center mb-2">
    <a href="#">English (US)</a>
    <a href="#">Deutsch</a>
    <a href="#">Türkçe</a>
    <a href="#">Polski</a>
    <a href="#">Italiano</a>
    <a href="#">Română</a>
    <a href="#">Français (France)</a>
    <a href="#">More languages...</a>
  </div>

  <div class="footer-links text-center">
    <a href="#">Sign Up</a>
    <a href="#">Log In</a>
    <a href="#">Messenger</a>
    <a href="#">Facebook Lite</a>
    <a href="#">Video</a>
    <a href="#">Meta Pay</a>
    <a href="#">Meta Store</a>
    <a href="#">Meta Quest</a>
    <a href="#">Instagram</a>
    <a href="#">Threads</a>
  </div>
</div>

</body>
</html>
